<!DOCTYPE html>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow-x: hidden; }
    .font-heading { font-family: 'Instrument Serif', serif; }
    .font-body { font-family: 'Barlow', sans-serif; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 999px; }
  </style>
  <script>
    // Suppress benign Framer Motion list key warnings
    const _origWarn = console.warn;
    console.warn = function(...args) {
      if (typeof args[0] === 'string' && args[0].includes('a `key` prop')) return;
      _origWarn.apply(console, args);
    };
  </script>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, forwardRef } = React;
    const { motion, AnimatePresence } = window.Motion;

    // ─── FadingVideo Component ───────────────────────────────────────────
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    function FadingVideo({ src, className = "", style = {} }) {
      const videoRef = useRef(null);
      const rAFId = useRef(null);
      const fadingOutRef = useRef(false);

      const fadeTo = useCallback((target, duration) => {
        const el = videoRef.current;
        if (!el) return;
        if (rAFId.current) cancelAnimationFrame(rAFId.current);
        const start = performance.now();
        const startOpacity = parseFloat(el.style.opacity) || 0;
        const delta = target - startOpacity;

        function step(now) {
          const t = Math.min((now - start) / duration, 1);
          el.style.opacity = startOpacity + delta * t;
          if (t < 1) rAFId.current = requestAnimationFrame(step);
        }
        rAFId.current = requestAnimationFrame(step);
      }, []);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const onLoaded = () => {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (!fadingOutRef.current && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = '0';
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener('loadeddata', onLoaded);
        video.addEventListener('timeupdate', onTimeUpdate);
        video.addEventListener('ended', onEnded);

        return () => {
          video.removeEventListener('loadeddata', onLoaded);
          video.removeEventListener('timeupdate', onTimeUpdate);
          video.removeEventListener('ended', onEnded);
          if (rAFId.current) cancelAnimationFrame(rAFId.current);
        };
      }, [fadeTo]);

      return (
        <video
          ref={videoRef}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ opacity: 0, ...style }}
          loop={false}
        >
          <source src={src} type="video/mp4" />
        </video>
      );
    }

    // ─── BlurText Component ──────────────────────────────────────────────
    function BlurText({ text, as: Tag = "h1", className = "", delay: staggerDelay = 0 }) {
      const [inView, setInView] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setInView(true); obs.disconnect(); } },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);

      const words = text.split(' ');
      return (
        <Tag ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
          {words.map((word, i) => (
            <motion.span
              key={i}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
              initial={false}
              animate={inView ? {
                filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0]
              } : {}}
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: 'easeOut',
                delay: staggerDelay + (i * 100) / 1000
              }}
            >
              {word}
            </motion.span>
          ))}
        </Tag>
      );
    }

    // ─── Icons ────────────────────────────────────────────────────────────

    const HomeIcon = () => (

    const GlobeIcon = () => (

      </svg>

    const ImageIcon = () => (

    const MovieIcon = () => (

    // ─── Hero Section ────────────────────────────────────────────────────

      return (
        <section className="relative w-full h-screen overflow-hidden">
          {/* Background Video — 120% width */}
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: '120%', height: '120%' }}
          />

          {/* Content Layer */}
          <div className="relative z-10 flex flex-col h-full">

            {/* Navbar */}
            <motion.nav
              className="fixed top-4 left-0 right-0 z-50 px-8 lg:px-16"
              initial={{ y: -20, opacity: 0 }}
              animate={{ y: 0, opacity: 1 }}
              transition={{ duration: 0.5, ease: 'easeOut' }}
            >
              <div className="flex items-center justify-between">
                {/* Logo */}
                <div className="flex items-center gap-3">
                <div className="liquid-glass w-12 h-12 rounded-full flex items-center justify-center overflow-hidden">
                  <img src="arkaa-logo.jpg" alt="Arkaa Realty" className="w-full h-full object-cover" />
                </div>
                <span className="hidden md:inline font-heading italic text-white text-xl tracking-[-0.5px]">Arkaa Realty</span>
              </div>

                {/* Center Nav Links — liquid-glass pill */}
                <div className="hidden md:flex liquid-glass rounded-full px-1.5 py-1.5 items-center gap-1">
                  {['Home', 'Estates', 'Interiors', 'Locations', 'Schedule Tour'].map((link) => (
                    <a key={link} href="#" className="px-3 py-2 text-sm font-medium text-white/90 font-body hover:text-white transition-colors">
                      {link}

                  <a href="#" className="liquid-glass-strong rounded-full px-5 py-2 text-sm font-medium text-black bg-white whitespace-nowrap flex items-center gap-1.5">
                    Explore Properties

                </div>

                {/* Mobile Spacer */}

            </motion.nav>

            {/* Hero Content — centered */}

              {/* Badge */}
              <motion.div

                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}

                <span className="bg-white text-black px-3 py-1 text-xs font-semibold rounded-full">New</span>
                <span className="text-sm text-white/90 pr-3 pl-2 font-body">10 Premium Properties by Arkaa Realty</span>

              {/* Headline */}
              <BlurText

              {/* Subheading */}
              <motion.p

                Experience living spaces reimagined by Arkaa Realty. Our curated collection of extraordinary properties brings architectural brilliance and natural beauty together — secure, stunning, and uniquely yours.

              {/* CTAs */}

              >
                <a href="#" className="liquid-glass-strong rounded-full px-5 py-2.5 text-sm font-medium text-white flex items-center gap-2">
                  Start Your Journey
                  <span className="inline-block w-5 h-5"><ArrowUpRight /></span>
                </a>
                <a href="#" className="text-sm font-medium text-white/80 hover:text-white flex items-center gap-2 transition-colors font-body">
                  <span className="inline-block w-4 h-4"><PlayIcon /></span>

              </motion.div>

              {/* Stats Row */}
              <motion.div

                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
                animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
                transition={{ duration: 0.6, delay: 1.3, ease: 'easeOut' }}
              >
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col">
                  <ClockIcon />
                  <div className="mt-auto">
                    <span className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">24/7</span>
                    <p className="text-xs text-white font-body font-light mt-2">Concierge & Property Support</p>
                  </div>
                </div>
                <div className="liquid-glass p-5 w-[220px] rounded-[1.25rem] flex flex-col">
                  <GlobeIcon />
                  <div className="mt-auto">
                    <span className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">15+</span>
                    <p className="text-xs text-white font-body font-light mt-2">Prime Locations Worldwide</p>
                  </div>
                </div>
              </motion.div>
            </div>

            {/* Partners */}
            <motion.div
              className="flex flex-col items-center gap-4 pb-8"
              initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
              animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
              transition={{ duration: 0.6, delay: 1.4, ease: 'easeOut' }}

                Trusted by the world's leading real estate innovators
              </div>
              <div className="flex items-center gap-12 md:gap-16 font-heading italic text-white text-2xl md:text-3xl tracking-tight">
                <span>Aeon</span><span>·</span><span>Vela</span><span>·</span><span>Apex</span><span>·</span><span>Orbit</span><span>·</span><span>Zeno</span>
              </div>
            </motion.div>
          </div>
        </section>
      );
    }

    // ─── Capabilities Section ────────────────────────────────────────────
    const capabilities = [
      {
        icon: <ImageIcon />,
        title: "Virtual Staging",
        tags: ["AI Interior Design", "Photo Realism", "Infinite Styles", "Eco-Vibe"],
        description: "Our AI transforms empty spaces into beautifully staged environments — from minimalist penthouses to coastal retreats.",
      },
      {

        tags: ["Scale Fast", "Visual Consistency", "Time Saver", "Ready to Share"],
        description: "Produce cinematic property walkthroughs in minutes. Create a unified visual identity for your portfolio without weeks of production.",
      },
      {
        icon: <LightbulbIcon />,
        title: "Smart Lighting",
        tags: ["Ray Tracing", "Physical Shadows", "Studio Quality", "Sunlight Sync"],
        description: "Automatic lighting and material adjustment for every property. Achieve flawless presentation with realistic natural light and ambiance.",
      },
    ];

    function Capabilities() {
      return (
        <section className="relative w-full min-h-screen overflow-hidden">
          {/* Background Video */}
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
            className="absolute inset-0 w-full h-full object-cover z-0"
          />

          {/* Content */}
          <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">
            {/* Header */}
            <div className="mb-auto">
              <motion.p
                className="text-sm font-body text-white/80 mb-6"
                initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
                whileInView={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
                viewport={{ once: true }}
                transition={{ duration: 0.5 }}
              >
                Capabilities
              </motion.p>
              <BlurText
                text="Arkaa Realty Evolved"
                as="h2"
                className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px] text-left"
                delay={0.1}
              />
            </div>

            {/* Cards grid */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
              {capabilities.map((cap, i) => (
                <motion.div
                  key={cap.title}
                  className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col"
                  initial={{ filter: 'blur(10px)', opacity: 0, y: 30 }}

                  <div className="flex items-start justify-between gap-4">

                    <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
                      {cap.tags.map((tag) => (
                        <span key={tag} className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">

                  {/* Bottom */}
                  <div className="mt-auto">
                    <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none mt-6">

                    <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">
                      {cap.description}

    // ─── App ─────────────────────────────────────────────────────────────
    function App() {
      return (
        <main>
          <Hero />
          <Capabilities />
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
